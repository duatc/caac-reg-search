<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>民航法规智能检索系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🛫 民航法规智能检索系统</h1>
            <p class="subtitle">基于语义理解的民航规章检索工具</p>
        </header>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="请输入问题，如：管制员连续执勤时间是多少？" autocomplete="off">
            <button id="searchBtn">检索</button>
        </div>

        <div id="loading" class="loading" style="display: none;">
            <span class="loading-text">检索中...</span>
        </div>

        <div id="results" class="results"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultsDiv = document.getElementById('results');
        const loadingDiv = document.getElementById('loading');

        async function doSearch() {
            const query = searchInput.value.trim();
            if (!query) {
                alert('请输入搜索内容');
                return;
            }

            resultsDiv.innerHTML = '';
            loadingDiv.style.display = 'block';
            searchBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/query`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: query })
                });

                if (!response.ok) {
                    throw new Error(`请求失败: ${response.status}`);
                }

                const data = await response.json();
                renderResults(data.results || []);
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">检索失败: ${error.message}</div>`;
            } finally {
                loadingDiv.style.display = 'none';
                searchBtn.disabled = false;
            }
        }

        function renderResults(results) {
            if (!results || results.length === 0) {
                resultsDiv.innerHTML = '<div class="no-results">未找到相关法规内容</div>';
                return;
            }

            results.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'result-card';

                const title = item.title || '未知法规';
                const content = item.content || '';
                const snippet = content.length > 200 ? content.substring(0, 200) + '...' : content;
                const sourceFile = item.source_file || '#';

                card.innerHTML = `
                    <h3 class="result-title">${title}</h3>
                    <p class="result-snippet">${snippet}</p>
                    <a href="${sourceFile}" target="_blank" class="view-source">查看原文</a>
                `;

                resultsDiv.appendChild(card);
            });
        }

        searchBtn.addEventListener('click', doSearch);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') doSearch();
        });
    </script>
</body>
</html>
