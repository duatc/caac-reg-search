name: Build Windows Executable

on:
  push:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build index
        run: python build_index.py

      - name: PyInstaller build
        run: pyinstaller CAAC-RegSearch.spec --noconfirm

      - name: Create distributable zip
        run: |
          Compress-Archive -Path "dist\CAAC-RegSearch\*" -DestinationPath "CAAC-RegSearch-portable.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CAAC-RegSearch-Windows
          path: CAAC-RegSearch-portable.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: CAAC-RegSearch-Windows
          path: dist

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CAAC-RegSearch-portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
